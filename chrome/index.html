<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>App Launcher Lite</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="cal-header">
    <input title="Type To Search" type="text" id="cal-search-bar" placeholder="Search...">
    <select title="Filter Site By Category" id="cal-category-filter">
      <option value="All">All Categories</option>
    </select>
    <button id="cal-theme-toggle" title="Switch Theme">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px">
        <path
          d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.106a.75.75 0 010 1.06l-1.591 1.59a.75.75 0 11-1.06-1.06l1.59-1.59a.75.75 0 011.06 0zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.894 17.894a.75.75 0 01-1.06 0l-1.59-1.591a.75.75 0 111.06-1.06l1.59 1.59a.75.75 0 010 1.061zM12 18a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM5.106 17.894a.75.75 0 010-1.06l1.59-1.59a.75.75 0 111.06 1.06l-1.59 1.59a.75.75 0 01-1.06 0zM3 12a.75.75 0 01.75-.75h2.25a.75.75 0 010 1.5H3.75A.75.75 0 013 12zM6.106 5.106a.75.75 0 011.06 0l1.591 1.59a.75.75 0 01-1.06 1.06l-1.59-1.591a.75.75 0 010-1.06z" />
      </svg>
    </button>
  </div>

  <div class="cal-link-grid" id="cal-link-grid"></div>

  <div id="cal-controls" class="cal-controls">
    <button title="Add New Shortcut" id="cal-add-btn">Add</button>
    <button title="Top Suggested Sites" id="cal-suggested-btn">Suggested</button>
    <button title="Export Backup" id="cal-export-btn">Export</button>
    <input type="file" id="cal-import-file" accept="application/json" hidden>
    <button title="Restore Confige" id="cal-import-btn">Import</button>
    <button title="App Info" id="cal-info-btn">Info</button>
    <button title="Restore To Default" id="cal-reset-btn" class="danger">Reset</button>
  </div>

  <div id="cal-contextMenu" class="context-menu">
    <button title="Open" class="menu-item" data-action="cal-open">Open</button>
    <button title="Open in New Tab" class="menu-item" data-action="cal-Newtab">Open in Tab</button>
    <button title="Open in Incognito Tab" class="menu-item" data-action="cal-incognito">Open in Incognito</button>
    <!-- <button title="Pin/Unpin This Shortcut" class="menu-item" data-action="cal-pin">Pin/UnPin</button> -->
    <button title="Edit This Shortcut" class="menu-item" data-action="cal-edit">Edit</button>
    <button title="Delete This Shortcut" class="menu-item" data-action="cal-delete">Delete</button>
  </div>

  <div class="add-link-box" id="cal-popupBox" style="display:none;">
    <div class="add-link-box-content">
      <h2 id="add-link-heading">Add Shortcut</h2>
      <input title="Type Name" type="text" id="cal-link-Tittle" autocomplete="off" placeholder="Name" />
      <input title="Type Link" type="text" id="cal-link-Url" autocomplete="off" placeholder="Pro-Bandey.github.io" />
      <input title="Select Category" type="text" id="cal-link-Category" autocomplete="off"
        placeholder="Category (e.g. Work, Social)" list="category-suggestions" />
      <datalist id="category-suggestions"></datalist>
      <input title="Past Icon URL" type="text" id="cal-link-Icon-Url" autocomplete="off"
        placeholder="Optional: Icon URL" />
      <div title="Upload Icon From Local" class="icon-uploader">
        <span>Or upload icon:</span>
        <input type="file" id="cal-link-Icon-File" accept="image/*">
      </div>
      <div class="add-link-box-buttons">
        <button title="Save Changes " class="add" id="cal-save-btn">Save</button>
        <button title="Cancel Changes" class="cancel" id="cal-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="cal-suggested-dialog" class="info-dialog" style="display: none;">
    <div class="info-dialog-content">
      <h2 class="info-dialog-heading">Top Visited Sites</h2>
      <div title="Top Suggested Sites" id="call-top-sites-list" class="call-top-sites-list"></div>
      <button title="Close" id="cal-suggested-close-btn">Close</button>
    </div>
  </div>

  <div id="cal-info-dialog" class="info-dialog" style="display: none;">
    <div class="info-dialog-content">
      <h2 class="info-dialog-heading">App Information</h2>
      <h2><strong>Chrome App Launcher</strong></h2>
      <h3><strong>Version:</strong> 5.0 </h3>
      <p>Features added: Google Sync Top Sites Auto-fill Categories UI enhancements</p>
      <button title="Close" id="cal-info-close-btn">Close</button>
    </div>
  </div>

  <script src="index.js"></script>
  <script src="toaster.js"></script>
  <script type="module" src="init.js"></script>
</body>

</html>
